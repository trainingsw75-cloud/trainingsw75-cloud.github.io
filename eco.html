<script>
const DATA = {"sea":{"manifesto":"Море не умеет просить о помощи. Оно просто мелеет, солонеет и однажды выносит на берег чёрную волну — как это случилось в Керченском проливе 15 декабря 2024 года. Мазут смывается годами, а память о нём остаётся в птицах, в рыбе, в песке под ногами. Мы не ищем виноватых — мы разбираем последствия: убираем берег, сообщаем о пятнах, поддерживаем тех, кто спасает животных. Проведите пальцем по экрану и очистите этот кусочек моря. А потом сделайте то же самое с настоящим.","facts":[{"big":"9 200 тонн","text":"Столько мазута было на борту двух танкеров, потерпевших крушение в шторм в Керченском проливе 15 декабря 2024 года. Сколько именно вылилось в море — точно не установлено до сих пор: оценки расходятся от 2,4 до 5 тысяч тонн. Источник: Википедия / Минтранс РФ, 2024–2025."},{"big":"почти 70 км берега","text":"К середине января 2025 года мазут был на 54 км береговой линии Краснодарского края и примерно на 15 км побережья Крыма. Отдельные следы находили далеко за пределами этой зоны. Источник: Expert Юг, 2025."},{"big":"7 336 птиц","text":"Столько испачканных мазутом птиц нашли в Анапе и Темрюкском районе с 17 декабря 2024 по 27 января 2025 года. Из них 6 091 — чомги, ныряющие птицы, которые кормятся под водой и потому пострадали сильнее всех. Источник: РБК, 2025."},{"big":"185 000 тонн","text":"Столько мазута вперемешку с песком и грунтом собрали с побережья за год после аварии; около 160 тысяч тонн уже утилизировали. Водолазы сделали более 21,5 тысячи погружений, чтобы поднять загрязнённый грунт со дна. Источник: РБК Кубань, декабрь 2025."},{"big":"16‰","text":"Рекордная солёность Азовского моря за более чем 70 лет наблюдений, зафиксированная в 2025 году. Причина — сокращение стока Дона и Кубани и аномально тёплое лето. Из-за этого пресноводные рыбы теряют места нагула, а медузы распространяются. Источник: АзНИИРХ (филиал ВНИРО), 2025."},{"big":"более 2 000 тонн","text":"А это хорошая новость: запас русского осетра в Азовском море за 2014–2023 годы вырос практически с нуля до более чем 2 тысяч тонн — благодаря охране и выпуску молоди с рыбзаводов. Восстановление возможно, если работать последовательно. Источник: ВНИРО, 2024."}],"actions":[{"icon":"🧤","title":"Уберите свой участок берега","text":"Даже полчаса и один мешок — это реальный результат. Собирайте мусор в перчатках, стекло и острые предметы складывайте отдельно. Не жгите мусор на берегу."},{"icon":"📞","title":"Сообщайте о пятнах и выбросах","text":"Увидели мазутное пятно, плёнку на воде или чёрные комки на песке — позвоните по номеру 112 и сообщите в территориальное управление Росприроднадзора. Сфотографируйте место и запишите точные координаты."},{"icon":"🐦","title":"Не трогайте испачканных животных руками","text":"Птица в мазуте — это паника, клюв и риск заражения для вас обоих. Не пытайтесь отмыть её сами: без специальной технологии выживаемость крайне низкая. Звоните волонтёрам-реабилитологам и ждите инструкций."},{"icon":"🐬","title":"Поддержите тех, кто спасает животных","text":"Научно-экологический центр спасения дельфинов «Дельфа» ведёт учёт погибших китообразных на побережье и выезжает на вызовы. Волонтёрская помощь, репост и пожертвование — всё это работает."},{"icon":"🧴","title":"Уменьшите свой сток в море","text":"Речной сток и бытовые стоки — один из постоянных источников загрязнения. Меньше одноразового пластика, меньше агрессивной бытовой химии, не сливайте масло и растворители в канализацию."},{"icon":"🎣","title":"Соблюдайте правила рыбалки","text":"Азовское море переживает тяжёлый период: вылов упал в десятки раз по сравнению с историческим максимумом. Не берите молодь, не бросайте сети и леску в воде — брошенные снасти продолжают убивать годами."}],"pledges":["Уносить с пляжа весь свой мусор — и ещё немного чужого","Сообщать о пятнах и выбросах, а не проходить мимо","Не трогать испачканных птиц руками, а звать специалистов","Хотя бы раз в год выходить на уборку берега","Отказаться от одноразового пластика на море","Рассказать о состоянии Азовского и Чёрного морей близким"],"shares":["15 декабря 2024 года в Керченском проливе затонули два танкера с 9,2 тысячи тонн мазута на борту. За год с берега собрали 185 тысяч тонн загрязнённого песка и грунта. Море всё ещё чистят. Я очистил свой кусочек — очисти свой: WARHOOK ECO «Спаси море».","7 336 испачканных мазутом птиц за полтора месяца, из них 6 091 — чомги. Об этом не должно быть тихо. Проведи пальцем по экрану, очисти море и сделай из этого свой арт: WARHOOK ECO «Спаси море».","Азовское море в 2025 году показало рекордную солёность за 70 лет наблюдений. Но есть и другая новость: запас русского осетра за десять лет вырос практически с нуля до 2 тысяч тонн. Восстановление возможно. WARHOOK ECO «Спаси море»."],"sources":["https://ru.wikipedia.org/wiki/Разлив_мазута_в_Керченском_проливе_(2024)","https://en.wikipedia.org/wiki/2024_Black_Sea_oil_spill","https://expertsouth.ru/articles/god-posle-katastrofy-khronika-sobytiy-posle-razliva-mazuta-v-chernom-more/","https://www.rbc.ru/rbcfreenews/6799ffc49a79479a195577b3","https://www.kavkaz-uzel.eu/articles/419212","https://kuban.rbc.ru/krasnodar/15/12/2025/693f17109a79474632d32c77"]},"air":{"manifesto":"Воздух — единственное, что мы потребляем каждые несколько секунд и не можем выбрать. Сегодня почти весь мир дышит воздухом, который не дотягивает до норм ВОЗ, и мелкие частицы PM2.5 попадают из дыма прямо в лёгкие и кровь. Но смог — не приговор и не погода: Европа за 18 лет сократила связанную с ним смертность более чем вдвое, а значит, чистое небо действительно можно расчистить — рукой, привычкой, решением.","facts":[{"big":"99%","text":"Столько населения планеты живёт там, где воздух не отвечает рекомендациям ВОЗ по качеству воздуха. Совокупное воздействие уличного и домашнего загрязнения связано примерно с 6,7 млн преждевременных смертей в год. Источник: информационный бюллетень ВОЗ, 2024 год (оценки по данным 2019 года)."},{"big":"8,1 млн","text":"Столько смертей в мире было связано с загрязнением воздуха в 2021 году, из них 709 тысяч — дети до 5 лет. Это второй по значимости фактор риска смерти после повышенного давления. Источник: доклад State of Global Air 2024 (Health Effects Institute и ЮНИСЕФ)."},{"big":"14%","text":"Всего столько городов мира укладываются в норму ВОЗ по мелким частицам PM2.5 — 5 микрограммов на кубометр. Проверяли 9 446 городов в 143 странах и территориях. Источник: World Air Quality Report компании IQAir, отчёт за 2025 год, опубликован в марте 2026 года."},{"big":"2,1 млрд","text":"Примерно четверть населения Земли готовит еду на открытом огне или неэффективных печах — на дровах, угле, кизяке или керосине. Дым в жилище содержит те же частицы PM2.5, и с загрязнением воздуха в домах ВОЗ связывает 2,9 млн смертей в год. Источник: бюллетень ВОЗ, 2025 год (данные за 2021 год)."},{"big":"38","text":"Столько городов России вошли в Приоритетный список с наибольшим уровнем загрязнения воздуха — в них живёт 9,3 млн человек, и 28 из 38 находятся в азиатской части страны. Наблюдения велись в 253 городах. Источник: Ежегодник Главной геофизической обсерватории им. Воейкова (Росгидромет) за 2024 год."},{"big":"−57%","text":"На столько снизилось в 27 странах ЕС число преждевременных смертей, связанных с PM2.5, за период с 2005 по 2023 год. Средняя концентрация PM2.5 упала с 19,4 до 10,2 микрограмма на кубометр. Это доказательство, что воздух поддаётся очистке. Источник: индикатор Европейского агентства по окружающей среде (EEA), опубликован в 2025 году, данные за 2023 год."}],"actions":[{"title":"Проверяйте воздух там, где живёте","text":"Посмотрите текущий индекс качества воздуха в своём городе на карте IQAir или на сайте местного гидрометцентра. Когда показатели высокие — закрывайте окна, откладывайте пробежку и проветривайте позже. Знание уровня PM2.5 в конкретный день — самая простая защита.","icon":"monitor"},{"title":"Не сжигайте мусор, листья и траву","text":"Костёр из веток, ботвы и особенно пластика даёт мелкие частицы PM2.5 и канцерогенные вещества прямо у вас во дворе. Листья и трава лучше уходят в компост, мусор — в раздельный сбор. Отказ от палов травы заодно снимает риск пожара.","icon":"no-fire"},{"title":"Топите чище, если у вас печь","text":"Сырые дрова и дешёвый уголь низкого качества дают в разы больше дыма и сажи, чем сухие дрова или современный котёл. Сухая древесина, исправная тяга, автоматический котёл, а где есть возможность — газ или электричество. В сибирских городах печи частного сектора вносят заметный вклад в зимний смог.","icon":"stove"},{"title":"Меньше пробега — меньше выбросов","text":"Автотранспорт даёт около 22% всех выбросов в России. Один день в неделю без машины, поездка пешком или на общественном транспорте, отказ от долгого прогрева на холостом ходу — это выбросы, которых просто не будет.","icon":"transport"},{"title":"Носите нормальную маску в дни смога","text":"От мелких частиц помогает респиратор класса FFP2/FFP3 или N95, а не тканевая повязка. Это особенно важно для детей, пожилых, астматиков и людей с болезнями сердца — именно по ним грязный воздух бьёт сильнее всего.","icon":"mask"},{"title":"Сделайте воздух чище дома","text":"Готовьте с включённой вытяжкой, не курите в помещении, регулярно проветривайте и вытирайте пыль влажной тряпкой. Очиститель воздуха с HEPA-фильтром реально снижает уровень PM2.5 в комнате — это заметная разница для тех, кто проводит дома много часов.","icon":"home"}],"pledges":["Не жгу мусор, листья и сухую траву","Проверяю качество воздуха, прежде чем открыть окно или выйти на пробежку","Топлю только сухими дровами и слежу за исправностью печи","Один день в неделю обхожусь без машины","Не курю в помещении и включаю вытяжку, когда готовлю","Расскажу трём людям, чем опасны частицы PM2.5"],"shares":["Только 14% городов мира укладываются в норму ВОЗ по мелким частицам PM2.5 — из 9 446 проверенных городов в 143 странах (отчёт IQAir за 2025 год). Проверьте, как дышит ваш город. #ОчистиВоздух","Загрязнение воздуха — второй по значимости фактор риска смерти в мире: 8,1 млн смертей за 2021 год, из них 709 тысяч — дети до 5 лет (доклад State of Global Air 2024). Это не фон, это причина. #ОчистиВоздух","Хорошая новость: воздух реально очищается. В странах ЕС число преждевременных смертей, связанных с PM2.5, снизилось на 57% с 2005 по 2023 год (данные Европейского агентства по окружающей среде, 2025). Смог — не погода, а решаемая задача. #ОчистиВоздух"],"sources":["https://www.who.int/news-room/fact-sheets/detail/ambient-(outdoor)-air-quality-and-health","https://www.stateofglobalair.org/news-events/2024/new-state-global-air-report-finds-air-pollution-second-leading-risk-factor-death","https://www.iqair.com/newsroom/waqr-2025-pr","https://www.who.int/news-room/questions-and-answers/item/who-global-air-quality-guidelines","https://www.who.int/news-room/fact-sheets/detail/household-air-pollution-and-health","https://www.eea.europa.eu/en/analysis/indicators/health-impacts-of-exposure-to"]},"forest":{"manifesto":"Выгоревший лес не возвращается сам по себе — и не возвращается быстро. Но почти каждый пожар начинается с мелочи: непотушенного костра, брошенного окурка, подожжённой сухой травы. Значит, и обратный путь начинается с мелочей: не поджечь, вовремя сообщить, посадить. Проведи пальцем по чёрной земле — и посмотри, как оживает лес. В жизни это работает так же: по одному дереву, по одному верному решению.","facts":[{"big":"30 млн га","text":"столько древесного покрова планета потеряла за 2024 год — больше, чем в любой другой год с начала наблюдений (Global Forest Watch / WRI, данные за 2024 г., опубликованы в 2025 г.)."},{"big":"45%","text":"почти половина всех потерь леса в мире в 2024 году пришлась на огонь — около 13 млн га. Это худший год по «пожарным» потерям за всю историю наблюдений (Global Forest Watch / WRI, 2024 г.)."},{"big":"7,5 млн га","text":"площадь лесных пожаров в России в 2024 году. Сезон 2024 года стал самым тёплым за последние 30 лет (Рослесхоз, итоги сезона 2024 г.)."},{"big":"98%","text":"доля лесных возгораний, возникших по вине человека: из 5 716 пожаров сезона 5 111 имели антропогенную причину, а от молний — только 99 (Рослесхоз, сводка от 29 мая 2019 г.). Это значит, что почти каждый пожар можно было не допустить."},{"big":"4,1 млрд га","text":"площадь лесов на Земле — это 31% всей суши. Россия, Бразилия, Канада, США и Китай вместе держат 54% мирового леса (ФАО, доклад «Состояние лесов мира — 2024», данные 2020 г.)."},{"big":"10,2 млн га","text":"столько леса в мире сводится ежегодно (период 2015–2020 гг.). Хорошая новость: раньше было больше — 15,8 млн га в год в 1990–2002 гг. Темп падает, значит, усилия работают (ФАО, 2024 г.)."}],"actions":[{"title":"Увидел дым — звони сразу","text":"Прямая линия лесной охраны: 8-800-100-94-00. Работает круглосуточно и бесплатно по всей России с 2012 года. Также подойдёт единый номер 112. Не жди, что «уже кто-то сообщил» — раннее сообщение решает всё: маленький пожар тушат за час, большой — неделями.","icon":"phone"},{"title":"Поставь приложение «Берегите лес»","text":"Бесплатное приложение ФБУ «Авиалесоохрана». Позволяет отправить сообщение о пожаре с фотографией, автоматически приложив координаты места. Установи заранее — в лесу будет поздно искать.","icon":"smartphone"},{"title":"Никогда не жги сухую траву","text":"Весенние палы травы — одна из главных причин ухода огня в лес. По Правилам противопожарного режима (постановление Правительства РФ №1479 от 16.09.2020) выжигание сухой травы, стерни и пожнивных остатков на землях сельхозназначения, запаса и в населённых пунктах запрещено. Трава горит быстрее, чем человек успевает добежать.","icon":"ban"},{"title":"Костёр — по правилам или никак","text":"Разводи огонь только на очищенной от травы и хвои площадке, не ближе 50 метров от построек, зону вокруг костра очисти минимум на 2 метра. Не разводи костёр в хвойном молодняке, на торфянике и в сухую ветреную погоду. Уходя — залей водой и перемешай угли до холодного пепла, чтобы не осталось ни одной искры.","icon":"flame"},{"title":"Убери за собой окурки и стекло","text":"Брошенный окурок и оставленная стеклянная банка — это готовый источник возгорания. Окурок туши в воде или в земле, а мусор увози с собой. Одно движение руки — минус один потенциальный пожар.","icon":"trash"},{"title":"Посади дерево по-настоящему","text":"Найди ближайшую акцию по восстановлению леса в своём регионе — их проводят лесничества, региональные минприроды и волонтёрские объединения. Сажай только местные породы и только там, где это согласовано с лесничеством: дерево не в том месте не приживётся. Один выезд на посадку — это сотни саженцев.","icon":"sprout"}],"pledges":["Я не буду жечь сухую траву — никогда и нигде.","Я всегда заливаю костёр водой и перемешиваю угли, пока они не остынут.","Я туплю окурок в воде или в земле и увожу мусор с собой.","Я сохраню номер 8-800-100-94-00 в телефоне и позвоню при первом же дыме.","Я поставлю приложение «Берегите лес» до следующего выезда на природу.","Я посажу хотя бы одно дерево в этом году и позову с собой друга."],"shares":["98% лесных возгораний возникают по вине человека — по данным Рослесхоза, из 5 716 пожаров сезона от молний было всего 99. Значит, почти каждый пожар можно было предотвратить. Я прошёл миссию «ВЕРНИ ЛЕС» — попробуй и ты. Номер, который стоит сохранить прямо сейчас: 8-800-100-94-00.","В 2024 году планета потеряла 30 млн га леса — больше, чем в любой год за всю историю наблюдений, и почти половину этого забрал огонь (Global Forest Watch, 2024). Лес не вырастает за один сезон. Но и сгорает он от одной искры. Проверь себя в миссии «ВЕРНИ ЛЕС».","Не жги сухую траву. Залей костёр. Увидел дым — звони 8-800-100-94-00 или 112. Три простых правила, которые реально спасают лес. Я посадил свой лес пальцем в миссии «ВЕРНИ ЛЕС» — посади и ты, а потом сделай это по-настоящему."],"sources":[]}};
const MISS = {
  sea:    { title:'Спаси море',    hint:'👆 Проведи пальцем по нефти — очисти море', label:'Очищено', poster:'Я очистил своё море', unit:'% чистой воды', acc:'#12E6C4', mode:'erase' },
  air:    { title:'Очисти воздух', hint:'👆 Проведи пальцем по смогу — верни небо',  label:'Развеяно', poster:'Я вернул чистое небо', unit:'% чистого неба', acc:'#7FD4FF', mode:'erase' },

};
const TARGET_TREES = 42;
let cur='sea', cleaned=0, trees=[], pledge='', posterReady=false;
const base=document.getElementById('base'), over=document.getElementById('over');
const bc=base.getContext('2d'), oc=over.getContext('2d',{willReadFrequently:true});
let W,H,DPR;
function rnd(s){let x=Math.sin(s*99.13)*43758.5453;return x-Math.floor(x);}

/* ---------- BASE LAYERS ---------- */
function seaBase(){
  const g=bc.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0aa3b8');g.addColorStop(.45,'#0e7f9e');g.addColorStop(1,'#053a52');
  bc.fillStyle=g;bc.fillRect(0,0,W,H);
  bc.globalCompositeOperation='lighter';
  for(let i=0;i<9;i++){const x=rnd(i+1)*W,w2=20+rnd(i+9)*70;const gg=bc.createLinearGradient(x,0,x+w2,H);
    gg.addColorStop(0,'rgba(180,255,245,.16)');gg.addColorStop(1,'rgba(180,255,245,0)');bc.fillStyle=gg;
    bc.beginPath();bc.moveTo(x,0);bc.lineTo(x+w2,0);bc.lineTo(x+w2*2.4,H);bc.lineTo(x+w2*1.1,H);bc.fill();}
  for(let i=0;i<38;i++){const x=rnd(i+21)*W,y=rnd(i+55)*H,r=2+rnd(i+77)*7;
    bc.fillStyle='rgba(190,255,250,'+(0.1+rnd(i+3)*0.2)+')';bc.beginPath();bc.arc(x,y,r,0,6.28);bc.fill();}
  bc.globalCompositeOperation='source-over';
  for(let i=0;i<7;i++){const x=rnd(i+101)*W*0.9+W*0.05,y=H*0.25+rnd(i+7)*H*0.6,s=8+rnd(i+13)*14,d=rnd(i+5)>.5?1:-1;
    bc.fillStyle='rgba(6,50,66,'+(0.35+rnd(i+9)*0.3)+')';
    bc.beginPath();bc.ellipse(x,y,s,s*0.42,0,0,6.28);bc.fill();
    bc.beginPath();bc.moveTo(x-d*s,y);bc.lineTo(x-d*(s+s*0.7),y-s*0.4);bc.lineTo(x-d*(s+s*0.7),y+s*0.4);bc.closePath();bc.fill();}
}
function airBase(){
  const g=bc.createLinearGradient(0,0,0,H); g.addColorStop(0,'#2a86d8');g.addColorStop(.55,'#7cc4f0');g.addColorStop(1,'#ffd9a8');
  bc.fillStyle=g;bc.fillRect(0,0,W,H);
  const sx=W*0.76, sy=H*0.24;
  const sg=bc.createRadialGradient(sx,sy,0,sx,sy,W*0.3);
  sg.addColorStop(0,'rgba(255,246,200,.95)');sg.addColorStop(.35,'rgba(255,225,150,.5)');sg.addColorStop(1,'rgba(255,220,150,0)');
  bc.fillStyle=sg;bc.beginPath();bc.arc(sx,sy,W*0.3,0,6.28);bc.fill();
  bc.fillStyle='rgba(255,255,255,.85)';
  for(let i=0;i<5;i++){const x=rnd(i+11)*W,y=H*0.15+rnd(i+3)*H*0.35,s=18+rnd(i+7)*26;
    bc.beginPath();bc.ellipse(x,y,s*1.6,s*0.6,0,0,6.28);bc.fill();
    bc.beginPath();bc.ellipse(x+s*0.7,y-s*0.28,s*0.9,s*0.5,0,0,6.28);bc.fill();}
  bc.strokeStyle='rgba(40,60,80,.55)';bc.lineWidth=2;bc.lineCap='round';
  for(let i=0;i<6;i++){const x=W*0.1+rnd(i+31)*W*0.7,y=H*0.2+rnd(i+41)*H*0.4,s=5+rnd(i+51)*6;
    bc.beginPath();bc.moveTo(x-s,y);bc.quadraticCurveTo(x-s*0.4,y-s*0.7,x,y);bc.quadraticCurveTo(x+s*0.4,y-s*0.7,x+s,y);bc.stroke();}
}
function forestBase(){
  const g=bc.createLinearGradient(0,0,0,H); g.addColorStop(0,'#4a4033');g.addColorStop(.5,'#2f2a24');g.addColorStop(1,'#191612');
  bc.fillStyle=g;bc.fillRect(0,0,W,H);
  for(let i=0;i<160;i++){const x=rnd(i+9)*W,y=H*0.35+rnd(i+19)*H*0.65,r=1+rnd(i+29)*2.4;
    bc.fillStyle='rgba(120,110,100,'+(0.1+rnd(i+5)*0.25)+')';bc.beginPath();bc.arc(x,y,r,0,6.28);bc.fill();}
  for(let i=0;i<11;i++){const x=rnd(i+61)*W,y=H*0.55+rnd(i+71)*H*0.4,h=10+rnd(i+81)*26,w2=4+rnd(i+91)*5;
    bc.fillStyle='rgba(22,18,15,.95)';bc.fillRect(x-w2/2,y-h,w2,h);
    bc.fillStyle='rgba(60,50,42,.7)';bc.fillRect(x-w2/2,y-h,w2*0.4,h);}
  bc.strokeStyle='rgba(30,25,20,.8)';bc.lineWidth=3;
  for(let i=0;i<4;i++){const x=rnd(i+121)*W,y=H*0.75+rnd(i+131)*H*0.2,l=30+rnd(i+141)*70;
    bc.beginPath();bc.moveTo(x,y);bc.lineTo(x+l,y-6-rnd(i+151)*10);bc.stroke();}
}
/* ---------- OVERLAYS ---------- */
function oilOver(){
  oc.clearRect(0,0,W,H); oc.fillStyle='#080a0c'; oc.fillRect(0,0,W,H);
  oc.globalCompositeOperation='lighter';
  const cols=['rgba(120,60,160,.10)','rgba(40,120,140,.10)','rgba(150,110,40,.10)'];
  for(let i=0;i<10;i++){const x=rnd(i+31)*W,y=rnd(i+41)*H,r=40+rnd(i+51)*120;
    const g=oc.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,cols[i%3]);g.addColorStop(1,'rgba(0,0,0,0)');
    oc.fillStyle=g;oc.beginPath();oc.arc(x,y,r,0,6.28);oc.fill();}
  oc.globalCompositeOperation='source-over';
}
function smogOver(){
  oc.clearRect(0,0,W,H);
  const g=oc.createLinearGradient(0,0,0,H); g.addColorStop(0,'#6b6257');g.addColorStop(.5,'#57514a');g.addColorStop(1,'#3b3733');
  oc.fillStyle=g;oc.fillRect(0,0,W,H);
  for(let i=0;i<14;i++){const x=rnd(i+13)*W,y=H*0.3+rnd(i+23)*H*0.7,r=30+rnd(i+33)*90;
    const gg=oc.createRadialGradient(x,y,0,x,y,r);
    gg.addColorStop(0,'rgba(18,16,14,.75)');gg.addColorStop(1,'rgba(18,16,14,0)');
    oc.fillStyle=gg;oc.beginPath();oc.arc(x,y,r,0,6.28);oc.fill();}
  for(let i=0;i<3;i++){const x=W*0.15+rnd(i+43)*W*0.7;
    for(let k=0;k<12;k++){const y=H-(k*H/13),r=12+k*4.5;
      const gg=oc.createRadialGradient(x+Math.sin(k+i)*14,y,0,x+Math.sin(k+i)*14,y,r);
      gg.addColorStop(0,'rgba(10,9,8,.55)');gg.addColorStop(1,'rgba(10,9,8,0)');
      oc.fillStyle=gg;oc.beginPath();oc.arc(x+Math.sin(k+i)*14,y,r,0,6.28);oc.fill();}}
}
function clearOver(){ oc.clearRect(0,0,W,H); }

function drawTree(x,y,seedI){
  const s=(0.7+rnd(seedI+7)*0.6)*Math.max(14,W*0.035);
  oc.fillStyle='#5a3f2a'; oc.fillRect(x-s*0.09,y-s*0.55,s*0.18,s*0.6);
  const greens=['#2f8f4e','#3faa5c','#4ADE80','#268a49'];
  for(let i=0;i<3;i++){
    const c=greens[Math.floor(rnd(seedI+i+3)*greens.length)];
    oc.fillStyle=c;
    oc.beginPath();
    oc.moveTo(x, y-s*(1.25-i*0.22));
    oc.lineTo(x-s*(0.42-i*0.07), y-s*(0.52-i*0.16));
    oc.lineTo(x+s*(0.42-i*0.07), y-s*(0.52-i*0.16));
    oc.closePath(); oc.fill();
  }
}

/* ---------- engine ---------- */
function sizeAll(){
  DPR=Math.min(devicePixelRatio||1,2);
  const w=base.clientWidth,h=w*0.75;
  [base,over].forEach(c=>{c.width=w*DPR;c.height=h*DPR;});
  bc.setTransform(DPR,0,0,DPR,0,0); oc.setTransform(DPR,0,0,DPR,0,0);
  W=w;H=h; redraw();
}
function redraw(){
  if(cur==='sea'){seaBase();oilOver();}
  else if(cur==='air'){airBase();smogOver();}
  else{forestBase();clearOver();trees.forEach((t,i)=>drawTree(t.x,t.y,i));}
  if(cur!=='forest'){cleaned=0;}
  upd();
}
function erase(x,y){
  oc.globalCompositeOperation='destination-out';
  const r=Math.max(22,W*0.055);
  const g=oc.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'rgba(0,0,0,1)');g.addColorStop(.65,'rgba(0,0,0,.85)');g.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=g;oc.beginPath();oc.arc(x,y,r,0,6.28);oc.fill();
  oc.globalCompositeOperation='source-over';
}
function plant(x,y){
  if(y<H*0.32) return;
  for(const t of trees){ if(Math.hypot(t.x-x,t.y-y)<W*0.055) return; }
  trees.push({x,y}); drawTree(x,y,trees.length);
  cleaned=Math.min(100,Math.round(trees.length/TARGET_TREES*100)); upd();
}
function measure(){
  const step=12,d=oc.getImageData(0,0,over.width,over.height).data;
  let clear=0,total=0;
  for(let y=0;y<over.height;y+=step){for(let x=0;x<over.width;x+=step){const a=d[(y*over.width+x)*4+3];total++;if(a<40)clear++;}}
  cleaned=Math.round(clear/total*100); upd();
}
function upd(){
  document.getElementById('barI').style.width=cleaned+'%';
  document.getElementById('pctT').textContent=cleaned+'%';
  const h=document.getElementById('hint');
  h.style.opacity = cleaned>8?'0':'1';
}
let drawing=false,moves=0;
function pos(e){const r=over.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function act(p){ if(MISS[cur].mode==='erase'){erase(p.x,p.y);} else {plant(p.x,p.y);} }
function down(e){drawing=true;act(pos(e));e.preventDefault();}
function move(e){if(!drawing)return;const p=pos(e);act(p);if(MISS[cur].mode==='erase'&&++moves%8===0)measure();e.preventDefault();}
function up(){if(drawing){drawing=false;if(MISS[cur].mode==='erase')measure();}}
over.addEventListener('mousedown',down);over.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
over.addEventListener('touchstart',down,{passive:false});over.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',up);

/* ---------- render mission ---------- */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMission(k){
  cur=k; trees=[]; cleaned=0; posterReady=false;
  const m=MISS[k], d=DATA[k];
  document.documentElement.style.setProperty('--acc',m.acc);
  document.getElementById('ttl').textContent=m.title;
  document.getElementById('mani').textContent=d.manifesto;
  document.getElementById('hint').textContent=m.hint;
  document.getElementById('pctLabel').textContent=m.label;
  document.getElementById('dl').style.display='none';
  document.getElementById('exp').style.display='none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===k));
  const pl=document.getElementById('pl'); pl.innerHTML='';
  pledge=d.pledges[0]||'';
  d.pledges.forEach((p,i)=>{const b=document.createElement('button');b.textContent=p;if(i===0)b.classList.add('on');
    b.onclick=()=>{pl.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');pledge=p;};pl.appendChild(b);});
  document.getElementById('facts').innerHTML=d.facts.map(f=>'<div class="fact"><div class="big">'+esc(f.big)+'</div><div class="ft">'+esc(f.text)+'</div></div>').join('');
  document.getElementById('acts').innerHTML=d.actions.map(a=>'<div class="act"><div class="ai">'+esc(a.icon||'🌱')+'</div><div><div class="at">'+esc(a.title)+'</div><div class="ax">'+esc(a.text)+'</div></div></div>').join('');
  document.getElementById('src').innerHTML='Проверенные данные · '+d.sources.map(u=>'<a href="'+esc(u)+'" target="_blank" rel="noopener">источник</a>').join(' · ');
  redraw();
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{renderMission(t.dataset.m);window.scrollTo({top:0,behavior:'smooth'});});

/* ---------- poster ---------- */
function makePoster(){
  const c=document.getElementById('exp'),x=c.getContext('2d'),Wp=1080,Hp=1350,m=MISS[cur];
  x.fillStyle='#05121c';x.fillRect(0,0,Wp,Hp);
  const imgH=Math.round(Wp*0.75);
  x.drawImage(base,0,0,base.width,base.height,0,150,Wp,imgH);
  x.drawImage(over,0,0,over.width,over.height,0,150,Wp,imgH);
  x.textAlign='center';
  x.fillStyle=m.acc;x.font='30px Georgia';x.fillText('W A R H O O K   E C O',Wp/2,78);
  x.fillStyle='#F1F7F6';x.font='60px Georgia';x.fillText(m.poster,Wp/2,140);
  let y=150+imgH+70;
  x.fillStyle=m.acc;x.font='bold 52px Georgia';
  x.fillText(cur==='forest'? (trees.length+' деревьев') : (cleaned+m.unit),Wp/2,y); y+=62;
  x.fillStyle='#F1F7F6';x.font='italic 34px Georgia';
  const words=(pledge||'').split(' ');let line='',lines=[];
  words.forEach(w=>{if((line+' '+w).length>34){lines.push(line.trim());line=w;}else line+=' '+w;});
  if(line.trim())lines.push(line.trim());
  lines.slice(0,3).forEach(l=>{x.fillText('«'+l+'»',Wp/2,y);y+=44;});
  const nm=(document.getElementById('nm').value||'').trim();
  if(nm){x.fillStyle='#E4B24C';x.font='36px Georgia';x.fillText('— '+nm,Wp/2,y+16);}
  x.fillStyle='#6d8b93';x.font='24px Georgia';
  x.fillText('trainingsw75-cloud.github.io/eco.html',Wp/2,Hp-40);
  posterReady=true;
  document.getElementById('dl').style.display='flex';
  c.style.display='block';c.style.width='100%';c.style.maxWidth='420px';c.style.margin='14px auto 0';c.style.borderRadius='12px';
  c.scrollIntoView({behavior:'smooth',block:'center'});
}
function savePng(){if(!posterReady)return;const a=document.createElement('a');a.download='warhook-eco-'+cur+'.png';a.href=document.getElementById('exp').toDataURL('image/png');a.click();}
function share(){
  const d=DATA[cur];const t=(d.shares[Math.floor(Math.random()*d.shares.length)]||'')+' 🌍';
  const u='https://trainingsw75-cloud.github.io/eco.html';
  const link='https://t.me/share/url?url='+encodeURIComponent(u)+'&text='+encodeURIComponent(t);
  if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.openTelegramLink)Telegram.WebApp.openTelegramLink(link);else window.open(link,'_blank');
}
if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}
sizeAll(); renderMission('sea');
let rt;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(sizeAll,300);});
</script>
