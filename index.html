<!DOCTYPE html>
<html>
<head><title>AI Assistant</title></head>
<body>
  <h2>Задайте вопрос</h2>
  <input type="text" id="question" placeholder="Введите вопрос" style="width: 300px;">
  <button onclick="ask()">Отправить</button>
  <div id="answer" style="margin-top: 20px;"></div>

  <script>
    async function ask() {
      const question = document.getElementById('question').value;
      const response = await fetch('https://d5devpnr02o9anr7lg0j.8wihnuyr.apigw.yandexcloud.net', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: question})
      });
      const data = await response.json();
      document.getElementById('answer').innerHTML = '<b>Ответ:</b> ' + data.response;
    }
  </script>
</body>
</html>
